version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Lima
    open-pull-requests-limit: 3
    labels:
      - area:dependencies
      - area:ci
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Lima
    open-pull-requests-limit: 3
    labels:
      - area:dependencies
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      production-runtime:
        dependency-type: production
        update-types:
          - minor
          - patch
        patterns:
          - "*"
      development-tooling:
        dependency-type: development
        update-types:
          - minor
          - patch
        patterns:
          - "*"
